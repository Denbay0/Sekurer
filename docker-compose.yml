services:
  api:
    build: ./backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres-1:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      minio-1:
        condition: service_healthy

  worker:
    build: ./backend
    working_dir: /app
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      postgres-1:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      minio-1:
        condition: service_healthy

  postgres-1:
    image: postgres:16
    environment:
      POSTGRES_DB: sekurer
      POSTGRES_USER: sekurer
      POSTGRES_PASSWORD: sekurer_password
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sekurer -d sekurer"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis-1:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio-1:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "${MINIO_HOST_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9011}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
